name: Deploy Frontend

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Build Docker image
      run: docker build --no-cache -t skyline-console-monitoring:final .

    - name: Save image
      run: docker save skyline-console-monitoring:final | gzip > skyline-console.tar.gz

    - name: Transfer image
      uses: appleboy/scp-action@v0.1.4
      with:
        host: ${{ secrets.ALLINONE_HOST }}
        username: ${{ secrets.ALLINONE_USER }}
        key: ${{ secrets.ALLINONE_SSH_KEY }}
        source: skyline-console.tar.gz
        target: /tmp/

    - name: Deploy
      uses: appleboy/ssh-action@v0.1.10
      with:
        host: ${{ secrets.ALLINONE_HOST }}
        username: ${{ secrets.ALLINONE_USER }}
        key: ${{ secrets.ALLINONE_SSH_KEY }}
        script: |
          sudo docker load < /tmp/skyline-console.tar.gz
          sudo docker stop skyline_console 2>/dev/null || true
          sudo docker rm skyline_console 2>/dev/null || true
          sudo docker run -d --name skyline_console --network host \
            -e KOLLA_CONFIG_STRATEGY=COPY_ALWAYS \
            -v /etc/kolla/skyline-console/config.json:/var/lib/kolla/config_files/config.json \
            -v /etc/kolla/skyline-console/nginx.conf:/var/lib/kolla/config_files/nginx.conf \
            -v /etc/kolla/skyline-console/skyline.yaml:/var/lib/kolla/config_files/skyline.yaml \
            skyline-console-monitoring:final kolla_start
